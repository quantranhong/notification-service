spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notification_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/notification_events}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:}

server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    # In production use TLS 1.2+ (OWASP); configure key-store in cloud

# Notification channel providers (PaaS - use env in production)
notification:
  channels:
    email:
      provider: aws-ses  # or azure-communication
      from-address: ${EMAIL_FROM:noreply@example.com}
    sms:
      provider: aws-sns  # or azure-communication
    push:
      provider: firebase-fcm
  redis:
    idempotency-ttl-seconds: 86400
    rate-limit-window-seconds: 60
    rate-limit-max-per-user: 100
  internal:
    api-key: ${NOTIFICATION_INTERNAL_API_KEY:}  # required when called by separate Scheduler Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
